name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ffmpeg_ver:
        description: 'FFmpeg version (e.g. 8.1)'
        required: false
        default: '8.1'

jobs:
  build:
    name: win64
    runs-on: ubuntu-latest

    permissions:
      contents: write

    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve FFmpeg version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "val=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "val=${{ inputs.ffmpeg_ver }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install 7-Zip
        run: sudo apt-get install -y p7zip-full

      - name: Build (win64)
        shell: pwsh
        run: >
          ./build.ps1
          -Arch      win64
          -FfmpegVer "${{ steps.ver.outputs.val }}"

      - name: Publish to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: out/*

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-win64-${{ steps.ver.outputs.val }}
          path: out/*
          retention-days: 90
